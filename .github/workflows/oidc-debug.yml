name: OIDC Debug

# Prints the GitHub OIDC token's claims (sub / aud / repository) so we can see
# exactly what AWS receives. No AWS calls, no secrets. Run it from the Actions
# tab (Run workflow), then read the "Print OIDC claims" step output.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Print OIDC claims
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com');
            const claims = JSON.parse(Buffer.from(token.split('.')[1], 'base64').toString());
            core.info('SUB=' + claims.sub);
            core.info('AUD=' + claims.aud);
            core.info('REPOSITORY=' + claims.repository);
            core.info('REPOSITORY_OWNER=' + claims.repository_owner);
            core.info('EVENT=' + claims.event_name);
            core.info('REF=' + claims.ref);
